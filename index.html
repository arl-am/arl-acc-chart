// ── Helpers ───────────────────────────────────────────────────────────────────
function cl(s){return s.replace(/^"|"$/g,'').trim();}
function sp(l){const r=[];let c='',q=false;for(const x of l){if(x==='"'){q=!q;c+=x;}else if(x===','&&!q){r.push(c);c='';}else c+=x;}r.push(c);return r;}
function nr(n){return n.toLowerCase().replace(/\s+/g,' ').trim();}
function s2f(s){if(!s)return null;const p=s.split(',');return p.length>=2?p[1].trim()+' '+p[0].trim():s.trim();}
function gd(t){return SD.find(d=>d.t.toLowerCase()===t.toLowerCase())||null;}
function gl(t){return TL[t.toLowerCase()]??4;}

function parseCSV(csv){
  const lines=csv.trim().split('\n');const pp=[];
  for(let i=1;i<lines.length;i++){
    const pts=sp(lines[i].trim());if(pts.length<2)continue;
    const ln=cl(pts[0]),fn=cl(pts[1]);
    let ti=cl(pts[2]||'');const su=cl(pts[3]||'');
    const fu=fn+' '+ln;const nn=nr(fu);
    const ov=OV[nn];
    if(ov&&ov.ti)ti=ov.ti;
    let se=T2S[ti.toLowerCase()]||null;
    if(ov&&ov.se)se=ov.se;
    pp.push({fu,nn,ti,su,se,lv:gl(ti)});
  }
  return pp;
}

function buildTree(pp){
  const bN={};pp.forEach(p=>{bN[p.nn]=p;});
  const ch={};const hp=new Set();
  pp.forEach(p=>{
    const sn=s2f(p.su);const ss=sn?nr(sn):null;
    if(!ch[p.nn])ch[p.nn]=[];
    if(ss&&bN[ss]){if(!ch[ss])ch[ss]=[];ch[ss].push(p.nn);hp.add(p.nn);}
    else if(ss&&!bN[ss]&&p.su){
      if(!bN[ss]){const sf=s2f(p.su);bN[ss]={fu:sf,nn:ss,ti:'President',su:'',se:'President',lv:gl('President')};pp.push(bN[ss]);if(!ch[ss])ch[ss]=[];}
      ch[ss].push(p.nn);hp.add(p.nn);
    }
  });
  return{bN,ch,roots:pp.filter(p=>!hp.has(p.nn)).map(p=>p.nn)};
}

function poolChildren(nns){
  const map={};
  nns.forEach(nn=>{
    const p=TR.bN[nn];if(!p)return;
    const hasKids=(TR.ch[nn]||[]).length>0;
    const key=hasKids?('__solo__'+nn):(p.su+'|||'+p.ti);
    if(!map[key])map[key]={ti:p.ti,se:p.se,lv:p.lv,su:p.su,members:[]};
    map[key].members.push(nn);
  });
  return Object.values(map).map(pool=>{
    const df=gd(pool.ti);
    pool.kpi=df?df.k:'';pool.resp=df?df.r:[];
    pool.rep=pool.members.reduce((a,b)=>(TR.ch[b]||[]).length>(TR.ch[a]||[]).length?b:a);
    pool.others=pool.members.filter(nn=>nn!==pool.rep);
    pool.allNames=[pool.rep,...pool.others].map(nn=>TR.bN[nn]?.fu||nn);
    pool.hasKids=(TR.ch[pool.rep]||[]).length>0;
    return pool;
  });
}

const COL=new Set();
const PB=[];
let TR={},PP=[];

function mkCard(pool){
  const{rep,ti,se,lv,kpi,resp,allNames,hasKids}=pool;
  const d=document.createElement('div');
  d.className=`card ${lvlClass(lv)}${hasKids?' hc':''}`;
  const seat=se||ti||'';
  let h=`<div class="ch"><div class="cs">${seat}</div><div class="ct">${ti}</div>${kpi?`<div class="ck">${kpi}</div>`:''}${hasKids?`<div class="tb">${COL.has(rep)?'+':'−'}</div>`:''}</div>`;
  if(resp&&resp.length)h+=`<div class="cr"><div class="rl">Responsibilities</div>${resp.map(r=>`<div class="ri">${r}</div>`).join('')}</div>`;
  h+=`<div class="cp"><div class="pl">${ti}</div><div class="pn">${allNames.join('<br>')}</div></div>`;
  d.innerHTML=h;
  if(hasKids)d.addEventListener('click',()=>{COL.has(rep)?COL.delete(rep):COL.add(rep);render();});
  return d;
}

function nameFor(l){return LN[l+1]||('Level '+l);}

function mkPH(fromLv,toLv){
  const els=[];
  for(let l=fromLv+1;l<toLv;l++){
    const vl=document.createElement('div');vl.className='vl';
    const ph=document.createElement('div');ph.className='ph';
    ph.innerHTML=`<div class="ph-txt"><span class="ph-lvl">${nameFor(l)}</span>— Vacant —</div>`;
    els.push(vl,ph);
  }
  return els;
}

function buildNode(nn,pLv){
  const p=TR.bN[nn];if(!p)return document.createElement('div');
  const myLv=p.lv??4;
  const outer=document.createElement('div');outer.style.cssText='display:flex;flex-direction:column;align-items:center;';
  if(pLv!==null&&myLv>pLv+1){mkPH(pLv,myLv).forEach(el=>outer.appendChild(el));const vl=document.createElement('div');vl.className='vl';outer.appendChild(vl);}
  const wrap=document.createElement('div');wrap.className='tnw';
  const selfPool={rep:nn,ti:p.ti,se:p.se,lv:myLv,su:p.su,kpi:(gd(p.ti)||{}).k||'',resp:(gd(p.ti)||{}).r||[],allNames:[p.fu],hasKids:(TR.ch[nn]||[]).length>0,members:[nn],others:[]};
  wrap.appendChild(mkCard(selfPool));
  const kids=TR.ch[nn]||[];
  if(kids.length>0&&!COL.has(nn)){
    const vd=document.createElement('div');vd.className='vl';wrap.appendChild(vd);
    renderKids(wrap,poolChildren(kids),myLv);
  }
  outer.appendChild(wrap);return outer;
}

function buildPoolNode(pool,pLv){
  const myLv=pool.lv??4;
  const outer=document.createElement('div');outer.style.cssText='display:flex;flex-direction:column;align-items:center;';
  if(pLv!==null&&myLv>pLv+1){mkPH(pLv,myLv).forEach(el=>outer.appendChild(el));const vl=document.createElement('div');vl.className='vl';outer.appendChild(vl);}
  const wrap=document.createElement('div');wrap.className='tnw';
  wrap.appendChild(mkCard(pool));
  const kids=TR.ch[pool.rep]||[];
  if(kids.length>0&&!COL.has(pool.rep)){
    const vd=document.createElement('div');vd.className='vl';wrap.appendChild(vd);
    renderKids(wrap,poolChildren(kids),myLv);
  }
  outer.appendChild(wrap);return outer;
}

function renderKids(wrap,pools,myLv){
  if(pools.length===1){
    const col=document.createElement('div');col.className='ccol';
    const vu=document.createElement('div');vu.className='vl';col.appendChild(vu);
    col.appendChild(buildPoolNode(pools[0],myLv));wrap.appendChild(col);
  } else {
    const row=document.createElement('div');row.className='crow';
    pools.forEach(pool=>{
      const col=document.createElement('div');col.className='ccol';
      const vu=document.createElement('div');vu.className='vl';col.appendChild(vu);
      col.appendChild(buildPoolNode(pool,myLv));row.appendChild(col);
    });
    const hb=document.createElement('div');
    hb.style.cssText='position:absolute;height:1px;background:#bbb;top:0;pointer-events:none;';
    row.appendChild(hb);row._hb=hb;PB.push(row);wrap.appendChild(row);
  }
}

function fixBars(){
  PB.forEach(row=>{
    const cols=Array.from(row.children).filter(c=>c!==row._hb);
    if(cols.length<2)return;
    const rr=row.getBoundingClientRect();
    const f=cols[0].getBoundingClientRect();
    const l=cols[cols.length-1].getBoundingClientRect();
    row._hb.style.left=(f.left-rr.left+f.width/2)+'px';
    row._hb.style.width=(l.left-rr.left+l.width/2-(f.left-rr.left+f.width/2))+'px';
  });
}

function render(){
  PB.length=0;
  const wrap=document.getElementById('zoom-wrap');wrap.innerHTML='';
  const row=document.createElement('div');row.style.cssText='display:flex;flex-direction:row;align-items:flex-start;';
  TR.roots.forEach(rnn=>{
    const col=document.createElement('div');col.className='ccol';
    col.appendChild(buildNode(rnn,null));row.appendChild(col);
  });
  wrap.appendChild(row);
  requestAnimationFrame(()=>requestAnimationFrame(fixBars));
}

// ── Zoom ──────────────────────────────────────────────────────────────────────
let currentZoom=1.0;
function adjustZoom(delta){
  currentZoom=Math.min(2.0,Math.max(0.3,currentZoom+delta));
  applyZoom();
}
function resetZoom(){currentZoom=1.0;applyZoom();}
function applyZoom(){
  const zw=document.getElementById('zoom-wrap');
  zw.style.transform=`scale(${currentZoom})`;
  zw.style.transformOrigin='top left';
  // Adjust the outer container height to match scaled content
  const tw=document.getElementById('tree-wrap');
  tw.style.height=currentZoom<1?(zw.scrollHeight*currentZoom+40)+'px':'';
  document.getElementById('zoom-label').textContent=Math.round(currentZoom*100)+'%';
}

// ── Uploader navigation ───────────────────────────────────────────────────────
function goToUploader(){
  // Store current page URL so uploader can return here
  const returnUrl=encodeURIComponent(window.location.href);
  window.location.href='uploader.html?return='+returnUrl;
}

function expandAll(){COL.clear();render();}
function collapseAll(){PP.forEach(p=>{if((TR.ch[p.nn]||[]).length>0)COL.add(p.nn);});render();}

function doSearch(val){
  const sr=document.getElementById('sr');
  const tw=document.getElementById('tree-wrap');
  if(!val.trim()){sr.style.display='none';tw.style.display='';return;}
  const q=val.toLowerCase();
  const m=PP.filter(p=>p.fu.toLowerCase().includes(q)||(p.ti||'').toLowerCase().includes(q)||(p.se||'').toLowerCase().includes(q));
  tw.style.display='none';sr.style.display='';
  if(!m.length){sr.innerHTML='<div class="empty">No results found.</div>';return;}
  const row=document.createElement('div');row.className='sr-row';
  m.forEach(p=>{
    const pool={rep:p.nn,ti:p.ti,se:p.se,lv:p.lv,su:p.su,kpi:(gd(p.ti)||{}).k||'',resp:(gd(p.ti)||{}).r||[],allNames:[p.fu],hasKids:false,members:[p.nn],others:[]};
    const c=mkCard(pool);c.style.cursor='default';row.appendChild(c);
  });
  sr.innerHTML=`<div style="font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">${m.length} result${m.length!==1?'s':''}</div>`;
  sr.appendChild(row);
}

function initChart(csv){
  PP=parseCSV(csv);TR=buildTree(PP);
  COL.clear();
  function cb(nn,d){if(d>0&&(TR.ch[nn]||[]).length>0)COL.add(nn);(TR.ch[nn]||[]).forEach(k=>cb(k,d+1));}
  TR.roots.forEach(r=>cb(r,0));
  render();
  // Enable controls
  document.getElementById('search').disabled=false;
  document.getElementById('btn-expand').disabled=false;
  document.getElementById('btn-collapse').disabled=false;
}

// ── JSONBin fetch ─────────────────────────────────────────────────────────────
async function loadFromBin(){
  const status=document.getElementById('status');
  try {
    // Fetch without X-Bin-Meta so we get the full wrapper including metadata
    const res=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{
      headers:{'X-Master-Key':READ_KEY}
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();

    // JSONBin wraps the stored object under data.record
    // Our uploader stores { csv: "...", updatedAt: "..." } as the record
    const record = data.record ?? data; // fallback if no wrapper
    const csv = record.csv ?? record;   // fallback if record IS the csv string

    if(!csv || typeof csv !== 'string' || csv.trim().length === 0){
      throw new Error('No CSV data found in bin — please use the uploader to push your Paylocity export first.');
    }

    const updatedAt = record.updatedAt ?? data.metadata?.createdAt;
    status.style.display='none';
    if(updatedAt){
      const d=new Date(updatedAt);
      document.getElementById('last-updated').textContent=
        'Last updated: '+d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
    }
    initChart(csv);
  } catch(e){
    status.className='status-error';
    status.textContent='Could not load org chart data. '+e.message;
    // Show manual fallback upload button
    document.getElementById('fallback-upload').style.display='block';
  }
}

function loadFallbackFile(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    document.getElementById('status').style.display='none';
    document.getElementById('fallback-upload').style.display='none';
    initChart(e.target.result);
  };
  r.readAsText(f);
}

loadFromBin();
</script>
